<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 220" role="img" aria-labelledby="title desc">
  <title id="title">Lunari Ruby Logo</title>
  <desc id="desc">A ruby-red Lunari wordmark with a crescent moon and typed Ruby script marks.</desc>
  <defs>
    <linearGradient id="ruby" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff6a7a"/>
      <stop offset="0.38" stop-color="#d8244f"/>
      <stop offset="1" stop-color="#8f1037"/>
    </linearGradient>
    <linearGradient id="moon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff8df"/>
      <stop offset="1" stop-color="#ffd56a"/>
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#300516" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="640" height="220" rx="24" fill="#16171b"/>
  <g filter="url(#soft-shadow)">
    <path d="M112 28 190 72 170 162 92 196 28 142 42 58Z" fill="url(#ruby)"/>
    <path d="M112 28 190 72 112 92 42 58Z" fill="#ff8d98" opacity="0.7"/>
    <path d="M112 92 170 162 92 196Z" fill="#a6133d" opacity="0.8"/>
    <path d="M42 58 112 92 92 196 28 142Z" fill="#c61f48" opacity="0.85"/>
  </g>

  <path d="M142 58c-30 8-52 35-52 67 0 38 31 69 69 69 20 0 38-9 51-23-7 2-14 3-21 3-43 0-78-35-78-78 0-14 4-27 11-39Z" fill="url(#moon)"/>
  <text x="71" y="141" fill="#fff4f7" font-family="Consolas, 'Courier New', monospace" font-size="34" font-weight="700">@</text>
  <text x="150" y="118" fill="#fff4f7" font-family="Consolas, 'Courier New', monospace" font-size="28" font-weight="700">T</text>

  <text x="230" y="103" fill="#fff4f7" font-family="Segoe UI, Arial, sans-serif" font-size="58" font-weight="700" letter-spacing="0">Lunari</text>
  <text x="234" y="146" fill="#ffccd6" font-family="Consolas, 'Courier New', monospace" font-size="24">Typed Ruby for Godot</text>
  <path d="M234 166h286" stroke="#d8244f" stroke-width="5" stroke-linecap="round"/>
  <text x="234" y="193" fill="#ffd56a" font-family="Consolas, 'Courier New', monospace" font-size="16">def ready: void  ·  @export  ·  await signal</text>
</svg>
