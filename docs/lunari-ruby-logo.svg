<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 220" role="img" aria-labelledby="title desc">
  <title id="title">Lunari Ruby Logo</title>
  <desc id="desc">A ruby crescent moon beside the Lunari wordmark.</desc>
  <defs>
    <linearGradient id="ruby-main" x1="78" y1="80" x2="252" y2="218" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff87a0"/>
      <stop offset="0.35" stop-color="#e62c61"/>
      <stop offset="0.72" stop-color="#9d103d"/>
      <stop offset="1" stop-color="#4c061f"/>
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#300516" flood-opacity="0.34"/>
    </filter>
  </defs>

  <rect width="640" height="220" rx="24" fill="#16171b"/>

  <g filter="url(#soft-shadow)">
    <path d="M104 91c-18 35-20 77-3 113 27 57 95 82 154 57 16-7 30-16 42-29-21 9-44 13-67 10-68-9-119-67-120-134 0-6 1-12 4-18-4 0-7 1-10 1Z" fill="url(#ruby-main)"/>
  </g>

  <text x="270" y="101" fill="#fff4f7" font-family="Segoe UI, Arial, sans-serif" font-size="58" font-weight="700" letter-spacing="0">Lunari</text>
  <text x="274" y="144" fill="#ffccd6" font-family="Consolas, 'Courier New', monospace" font-size="24">Typed Ruby for Godot</text>
  <path d="M274 164h286" stroke="#d8244f" stroke-width="5" stroke-linecap="round"/>
  <text x="274" y="193" fill="#ffd56a" font-family="Consolas, 'Courier New', monospace" font-size="16">def ready: void / @export / await signal</text>
</svg>
