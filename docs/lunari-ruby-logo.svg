<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 220" role="img" aria-labelledby="title desc">
  <title id="title">Lunari Ruby Logo</title>
  <desc id="desc">A ruby-textured crescent moon beside the Lunari wordmark.</desc>
  <defs>
    <linearGradient id="ruby-main" x1="42" y1="34" x2="188" y2="188" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff8b93"/>
      <stop offset="0.32" stop-color="#e42b55"/>
      <stop offset="0.68" stop-color="#a90f38"/>
      <stop offset="1" stop-color="#5d0622"/>
    </linearGradient>
    <linearGradient id="ruby-light" x1="58" y1="50" x2="150" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffe0e4" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#ff5d73" stop-opacity="0.1"/>
    </linearGradient>
    <clipPath id="crescent-clip">
      <path d="M160 33c-39 9-68 44-68 86 0 49 40 89 89 89 25 0 48-10 64-27-10 3-20 5-31 5-57 0-103-46-103-103 0-19 5-37 14-52Z"/>
    </clipPath>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#300516" flood-opacity="0.38"/>
    </filter>
  </defs>

  <rect width="640" height="220" rx="24" fill="#16171b"/>

  <g filter="url(#soft-shadow)">
    <path d="M160 33c-39 9-68 44-68 86 0 49 40 89 89 89 25 0 48-10 64-27-10 3-20 5-31 5-57 0-103-46-103-103 0-19 5-37 14-52Z" fill="url(#ruby-main)"/>
    <g clip-path="url(#crescent-clip)">
      <path d="M96 44 153 82 107 117Z" fill="url(#ruby-light)"/>
      <path d="M153 82 225 49 205 126Z" fill="#cf1f4a" opacity="0.78"/>
      <path d="M107 117 163 150 121 210Z" fill="#7f0a2d" opacity="0.68"/>
      <path d="M163 150 205 126 246 181Z" fill="#b91843" opacity="0.72"/>
      <path d="M111 83 153 82 163 150 107 117Z" fill="#f44766" opacity="0.5"/>
      <path d="M92 119 107 117 121 210 78 169Z" fill="#9f1238" opacity="0.55"/>
      <path d="M94 44 153 82 225 49" fill="none" stroke="#ffd0d6" stroke-opacity="0.38" stroke-width="2"/>
      <path d="M107 117 153 82 205 126 163 150 107 117 121 210" fill="none" stroke="#ffd0d6" stroke-opacity="0.22" stroke-width="2"/>
      <path d="M93 118 107 117 163 150 246 181" fill="none" stroke="#5b061f" stroke-opacity="0.32" stroke-width="2"/>
    </g>
    <path d="M160 33c-39 9-68 44-68 86 0 49 40 89 89 89 25 0 48-10 64-27-10 3-20 5-31 5-57 0-103-46-103-103 0-19 5-37 14-52Z" fill="none" stroke="#ff9faf" stroke-opacity="0.55" stroke-width="3"/>
  </g>

  <text x="270" y="101" fill="#fff4f7" font-family="Segoe UI, Arial, sans-serif" font-size="58" font-weight="700" letter-spacing="0">Lunari</text>
  <text x="274" y="144" fill="#ffccd6" font-family="Consolas, 'Courier New', monospace" font-size="24">Typed Ruby for Godot</text>
  <path d="M274 164h286" stroke="#d8244f" stroke-width="5" stroke-linecap="round"/>
  <text x="274" y="193" fill="#ffd56a" font-family="Consolas, 'Courier New', monospace" font-size="16">def ready: void / @export / await signal</text>
</svg>
